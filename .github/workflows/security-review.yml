name: AI Security Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.jsx'
      - '**.tsx'
      - '**.go'
      - '**.rs'
      - '**.java'
      - '**.cs'
      - '**.php'
      - '**.rb'
      - '**.sql'
      - '**.sh'
      - '**.yml'
      - '**.yaml'
      - 'Dockerfile'
      - '**.env.example'

jobs:
  security:
    uses: estanbulgaming/.github/.github/workflows/security-review.yml@main
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_CI }}
