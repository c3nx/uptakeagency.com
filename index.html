<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptake Agency - Coming Soon</title>
    <meta name="description" content="Uptake Agency - Digital marketing agency. Our website is coming soon.">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="Uptake Agency - Coming Soon">
    <meta property="og:description" content="We understand your needs fast. We deliver faster. Our website is coming soon.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://uptakeagency.com">
    <meta property="og:image" content="https://uptakeagency.com/Uptake-logo-png-beyazyazi.png">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            animation: fadeIn 1.5s ease-out;
        }

        .logo {
            max-width: 100%;
            width: 350px;
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            font-weight: 300;
            margin-bottom: 10px;
            color: #8ed6f0;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            color: #b0b0b0;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background-color: #8ed6f0;
            margin: 20px auto;
            border-radius: 2px;
        }

        .contact-btn {
            display: inline-block;
            padding: 12px 30px;
            border: 2px solid #8ed6f0;
            color: #8ed6f0;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .contact-btn:hover {
            background-color: #8ed6f0;
            color: #121212;
            box-shadow: 0 0 15px rgba(142, 214, 240, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .logo {
                width: 280px;
            }
            h1 {
                font-size: 1.5rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Uptake-logo-png-beyazyazi.png" alt="Uptake Agency Logo" class="logo">

        <div class="divider"></div>

        <h1>COMING SOON</h1>
        <p>We understand your needs fast. We deliver faster.<br>
        Our website will be live very soon.</p>

        <a href="mailto:info@uptakeagency.com" class="contact-btn">CONTACT US</a>
    </div>

</body>
</html>
